<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Implementation Notes</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      line-height: 1.5;
      margin: 0;
      color: #1f2937;
      background: #f8fafc;
    }
    main {
      max-width: 960px;
      margin: 0 auto;
      padding: 32px 20px;
    }
    h1, h2 {
      color: #111827;
    }
    section {
      margin: 20px 0;
      padding: 16px;
      border: 1px solid #d1d5db;
      border-radius: 8px;
      background: #ffffff;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      background: #ffffff;
    }
    th, td {
      padding: 10px;
      border: 1px solid #d1d5db;
      text-align: left;
      vertical-align: top;
    }
    th {
      background: #f3f4f6;
    }
  </style>
</head>
<body>
  <main>
    <h1>Implementation Notes</h1>

    <section>
      <h2>Status</h2>
      <p><strong>Active milestone:</strong> <!-- current milestone --></p>
      <p><strong>Current state:</strong> <!-- current state --></p>
      <p><strong>Last updated:</strong> <!-- timestamp --></p>
    </section>

    <section>
      <h2>Decisions Outside The Spec</h2>
      <table>
        <thead>
          <tr>
            <th>Decision</th>
            <th>Reason</th>
            <th>Impact</th>
          </tr>
        </thead>
        <tbody>
          <tr>
            <td><!-- decision --></td>
            <td><!-- reason --></td>
            <td><!-- impact --></td>
          </tr>
        </tbody>
      </table>
    </section>

    <section>
      <h2>Required Changes</h2>
      <ul>
        <li><!-- change discovered during implementation --></li>
      </ul>
    </section>

    <section>
      <h2>Tradeoffs</h2>
      <ul>
        <li><!-- tradeoff and alternative considered --></li>
      </ul>
    </section>

    <section>
      <h2>Validation</h2>
      <table>
        <thead>
          <tr>
            <th>Check</th>
            <th>Result</th>
            <th>Notes</th>
          </tr>
        </thead>
        <tbody>
          <tr>
            <td><!-- command or check --></td>
            <td><!-- result --></td>
            <td><!-- notes --></td>
          </tr>
        </tbody>
      </table>
    </section>

    <section>
      <h2>User Handoff Notes</h2>
      <ul>
        <li><!-- anything the user should know --></li>
      </ul>
    </section>
  </main>
</body>
</html>
